<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hanna Drużga (57893) - PTW LAB C</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <link rel="stylesheet" href="leaflet-1.9.4/leaflet.css" />
    <script src="leaflet-1.9.4/leaflet-src.js"></script>
    <script src="leaflet-1.9.4/leaflet-providers.js"></script>
    <script src="leaflet-1.9.4/leaflet-image.js"></script>
    <style>
        #map {
            width: 600px;
            height: 300px;
            border: 1px solid black;
        }

        #rasterMap {
            width: 300px;
            height: 150px;
            border: 1px solid black;
        }
    </style>
</head>
<body>

<div id="map"></div>

<button id="getLocation" onclick="getLocation()">Get Location</button>
<button id="saveButton">Save Raster Map</button>
<strong>Latitude:</strong> <span id="latitude"></span><br>
<strong>Longitude:</strong> <span id="longitude"></span><br>
<br>

<canvas id="rasterMap" width="300" height="150"></canvas>

<script>
    let map = L.map('map').setView([53.430127, 14.564802], 18);
    L.tileLayer.provider('OpenStreetMap.DE').addTo(map);
    L.tileLayer.provider('Esri.WorldImagery').addTo(map);
    let marker = L.marker([53.430127, 14.564802]).addTo(map);
    marker.bindPopup("<strong>Hello!</strong><br>This is a popup.");

    document.getElementById("saveButton").addEventListener("click", function() {
        leafletImage(map, function (err, canvas) {
            // here we have the canvas
            let rasterMap = document.getElementById("rasterMap");
            let rasterContext = rasterMap.getContext("2d");

            rasterContext.drawImage(canvas, 0, 0, 300, 150);
        });
    });

    document.getElementById("getLocation").addEventListener("click", function(event) {
        if (! navigator.geolocation) {
            console.log("No geolocation.");
        }

        navigator.geolocation.getCurrentPosition(position => {
            console.log(position);
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            map.setView([lat, lon]);
        }, positionError => {
            console.error(positionError);
        });
    });
</script>
<script>
    function getLocation() {
        if (! navigator.geolocation) {
            alert("Sorry, no geolocation available for you!");
        }
        navigator.geolocation.getCurrentPosition((position) => {
            document.getElementById("latitude").innerText = position.coords.latitude;
            document.getElementById("longitude").innerText = position.coords.longitude;
        }, (positionError) => {
            console.error(positionError);
        }, {
            enableHighAccuracy: false
        });
    }
</script>
</body>
</html>
