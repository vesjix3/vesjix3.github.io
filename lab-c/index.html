<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hanna Drużga (57893) - PTW LAB C</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <link rel="stylesheet" href="leaflet-1.9.4/leaflet.css" />
    <script src="leaflet-1.9.4/leaflet-src.js"></script>
    <script src="leaflet-1.9.4/leaflet-providers.js"></script>
    <script src="leaflet-1.9.4/leaflet-image.js"></script>
    <script src="scripts.js"></script>
    <style>
        #map {
            width: 1000px;
            height: 480px;
            border: 1px solid black;
            margin-right: 50px;
        }

        #rasterMap {
            width: 1000px;
            height: 480px;
            border: 1px solid black;
        }
    </style>
</head>
<body>

<div id="map-board-row">
    <div id="map"></div>
    <div id="board-area">

        <div id="board"></div>
    </div>
</div>


<div id="game-area">
    <div id="table-area">
        <div id="controls">



            <button id="getLocation">Moja lokalizacja</button>
            <button id="saveButton">Save Raster Map</button>

            <div id="positionInfo">
                <strong>Latitude:</strong> <span id="latitude"></span><br>
                <strong>Longitude:</strong> <span id="longitude"></span><br>
            </div>
        </div>

        <div id="raster-table-row">
            <canvas id="rasterMap" width="1000" height="480"></canvas>
            <div id="table"></div>
        </div>
    </div>
</div>

<br>



<script>
    let map = L.map('map').setView([53.430127, 14.564802], 18);
    L.tileLayer.provider('OpenStreetMap.DE').addTo(map);
    L.tileLayer.provider('Esri.WorldImagery').addTo(map);


    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
        iconUrl: 'assets/marker-icon.png',
        iconRetinaUrl: 'assets/marker-icon-2x.png',
        shadowUrl: 'assets/marker-shadow.png'
    });

    let marker = L.marker([53.430127, 14.564802]).addTo(map);
    marker.bindPopup("<strong>hejka!</strong><br>jestes tutaj!");


    document.getElementById("getLocation").addEventListener("click", function() {
        if (!navigator.geolocation) {
            alert("Geolokalizacja nie jest dostępna na tej przeglądarce!");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;


                document.getElementById("latitude").innerText = lat.toFixed(6);
                document.getElementById("longitude").innerText = lon.toFixed(6);


                marker.setLatLng([lat, lon]);
                marker.setPopupContent("<strong>Twoja lokalizacja</strong><br>Lat: " + lat.toFixed(6) + "<br>Lon: " + lon.toFixed(6));


                map.setView([lat, lon], 18);

                console.log("Lokalizacja zaktualizowana: " + lat + ", " + lon);
            },
            function(error) {
                console.error("Błąd geolokalizacji:", error);
                alert("Nie udało się pobrać lokalizacji. Sprawdź uprawnienia przeglądarki.");
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    });

    document.getElementById("saveButton").addEventListener("click", function() {
        leafletImage(map, function (err, canvas) {
            if (err) {
                console.error(err);
                return;
            }

            let rasterMap = document.getElementById("rasterMap");
            let rasterContext = rasterMap.getContext("2d");

            rasterMap.width = 1000;
            rasterMap.height = 480;
            rasterContext.clearRect(0, 0, rasterMap.width, rasterMap.height);
            rasterContext.drawImage(canvas, 0, 0, 1000, 480);

            rasterMap.style.display = "block";

            if (typeof startPuzzle === "function") {
                startPuzzle(rasterMap);
            }
        });
    });
</script>
</body>
</html>
