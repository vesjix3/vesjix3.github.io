{% extends "layout.html" %}

{% block content %}
    <h1>{{ title }}</h1>

    <form action="{{ url_for('book_create') }}" method="POST">
        <div class="form-group">
            <label for="title">Tytuł książki:</label>
            <input type="text" id="title" name="title" placeholder="Wpisz tytuł..." required>
        </div>

        <div class="form-group">
            <label for="author">Autor:</label>
            <input type="text" id="author" name="author" placeholder="Wpisz autora..." required>
        </div>

        <br>
        <button type="submit">Dodaj książkę</button>
        <a href="{{ url_for('book_index') }}">Anuluj</a>
    </form>
{% endblock %}
